<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealCloser AI</title>
    <link rel="stylesheet" href="sidepanel.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <div class="logo-area">
                <span class="icon">🚀</span>
                <h1>DealCloser <span class="accent">AI</span></h1>
            </div>
            <div class="badge">PRO ACTIVE</div>
        </header>

        <section class="ai-suggestion-box">
            <h2>Smart Reply Suggestions</h2>
            <div id="suggestion-container" class="glass-box">
                <p class="placeholder-text">Click a framework below or type in chat to see suggestions...</p>
            </div>
        </section>

        <section class="frameworks">
            <h2>Closing Frameworks</h2>
            <div class="grid">
                <button class="framework-card" data-framework="assumptive">
                    <span class="f-icon">🎯</span>
                    <span class="f-title">Assumptive</span>
                </button>
                <button class="framework-card" data-framework="scarcity">
                    <span class="f-icon">⏳</span>
                    <span class="f-title">Scarcity</span>
                </button>
                <button class="framework-card" data-framework="social">
                    <span class="f-icon">🌟</span>
                    <span class="f-title">Social Proof</span>
                </button>
                <button class="framework-card" data-framework="objection">
                    <span class="f-icon">🛡️</span>
                    <span class="f-title">Objection</span>
                </button>
            </div>
        </section>

        <section class="pro-upgrade">
            <div class="upgrade-card gradient-border">
                <h3>Unlock Elite Closers</h3>
                <p>Get custom AI models trained on 10,000+ winning scripts.</p>
                <a href="https://wa.me/917479701271?text=Hi,%20I%20want%20to%20upgrade%20DealCloser%20AI%20to%20Pro" target="_blank" class="upgrade-btn">
                    Upgrade to Pro 💎
                </a>
            </div>
        </section>

        <footer class="footer-minimal">
            <p>Ready to close? Let's go.</p>
        </footer>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
